name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '✨ Features'
    labels: ['type: feature', 'feat']
  - title: '🐞 Fixes'
    labels: ['type: bug', 'fix', 'bug']
  - title: '⚙️ Refactor/Perf/Optimize'
    labels: ['refactor', 'perf', 'optimize']
  - title: '🧰 Chore/Build/CI'
    labels: ['chore', 'build', 'ci', 'deps']

change-template: '- $TITLE (#$NUMBER) by @$AUTHOR'
change-title-escapes: '\<*_&'

