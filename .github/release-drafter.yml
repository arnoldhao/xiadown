template: |
  ## 版本变更 / Changelog

  $CHANGES

version-resolver:
  major: { labels: ['breaking', 'type: breaking'] }
  minor: { labels: ['type: feature', 'feat'] }
  patch: { labels: ['type: bug', 'fix', 'bug', 'chore', 'build', 'ci', 'refactor', 'perf', 'optimize', 'deps'] }
  default: patch

exclude-labels: ['skip-changelog']
