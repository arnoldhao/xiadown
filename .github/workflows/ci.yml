name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

env:
  GO_VERSION: "1.25.5"
  BUN_VERSION: "1.3.5"
  WAILS_VERSION: "v3.0.0-alpha.74"

jobs:
  ci:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Install frontend deps
        run: bun install --frozen-lockfile
        working-directory: frontend

      - name: Generate frontend bindings
        run: wails3 task common:generate:bindings

      - name: Frontend governance audits
        run: bun run audit:all
        working-directory: frontend

      - name: Frontend build
        run: bun run build:dev
        working-directory: frontend

      - name: Frontend unit tests
        run: bun run test:unit
        working-directory: frontend

      - name: Go vet & test
        run: |
          go vet ./...
          go test ./...

  package-preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && contains(toJson(github.event.pull_request.labels), 'preview-binaries')
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            platform: macos
            artifact_name: preview-macos-arm64
            artifact_suffix: macos-arm64
          - runner: macos-26-intel
            platform: macos
            artifact_name: preview-macos-x64
            artifact_suffix: macos-x64
          - runner: windows-latest
            platform: windows
            artifact_name: preview-windows-x64
            artifact_suffix: windows-x64
    runs-on: ${{ matrix.runner }}
    env:
      TELEMETRYDECK_APP_ID: ${{ secrets.TELEMETRYDECK_APP_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate TelemetryDeck config
        shell: bash
        run: |
          test -n "${TELEMETRYDECK_APP_ID:-}" || { echo "TELEMETRYDECK_APP_ID is required"; exit 1; }

      - name: Resolve preview metadata
        shell: bash
        run: |
          head_sha="${{ github.event.pull_request.head.sha }}"
          echo "PREVIEW_ID=pr${{ github.event.pull_request.number }}-${head_sha::7}" >> "$GITHUB_ENV"
          echo "APP_VERSION=dev" >> "$GITHUB_ENV"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Refresh build assets
        run: wails3 task common:update:build-assets

      - name: Install frontend deps
        run: bun install --frozen-lockfile
        working-directory: frontend

      - name: Install NSIS
        if: matrix.platform == 'windows'
        uses: crazy-max/ghaction-chocolatey@v2
        with:
          args: install nsis

      - name: Ensure NSIS available
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $nsisPath = "${env:ProgramFiles(x86)}\NSIS\Bin"
          if (-not (Test-Path (Join-Path $nsisPath "makensis.exe"))) {
            throw "makensis.exe not found in $nsisPath"
          }
          $nsisPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build preview app (macOS)
        if: matrix.platform == 'macos'
        run: wails3 task darwin:package

      - name: Inspect preview macOS build metadata
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          sw_vers
          xcodebuild -version
          xcrun --show-sdk-version --sdk macosx
          echo "Binary build metadata:"
          otool -l bin/xiadown | grep -A3 -B1 LC_BUILD_VERSION
          echo "Bundle minimum OS version:"
          plutil -p bin/xiadown.app/Contents/Info.plist | grep LSMinimumSystemVersion

      - name: Build preview app (Windows)
        if: matrix.platform == 'windows'
        run: wails3 task windows:package

      - name: Prepare macOS preview artifact
        if: matrix.platform == 'macos'
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            bin/xiadown.app \
            dist/xiadown-preview-${{ matrix.artifact_suffix }}-${PREVIEW_ID}.zip

      - name: Prepare Windows preview artifacts
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $portableName = "xiadown-preview-${env:PREVIEW_ID}-${{ matrix.artifact_suffix }}.zip"
          Compress-Archive -Path "bin/xiadown.exe" -DestinationPath "dist/$portableName" -Force

          $installer = Get-ChildItem -Path bin -Filter "*installer.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Windows installer not found in ./bin"
          }

          $installerName = "xiadown-preview-${env:PREVIEW_ID}-${{ matrix.artifact_suffix }}-installer.exe"
          Copy-Item $installer.FullName "dist/$installerName"

      - name: Upload preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

  weekly-regression:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Install frontend deps
        run: bun install --frozen-lockfile
        working-directory: frontend

      - name: Generate frontend bindings
        run: wails3 task common:generate:bindings

      - name: Frontend governance audits
        run: bun run audit:all
        working-directory: frontend

      - name: Frontend build
        run: bun run build:dev
        working-directory: frontend

      - name: Frontend unit tests
        run: bun run test:unit
        working-directory: frontend

      - name: Go vet & test
        run: |
          go vet ./...
          go test ./...
